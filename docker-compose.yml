services:
  postgres:
    image: postgres:17
    container_name: llm-kb-postgres
    environment:
      POSTGRES_DB: llm-kb
      POSTGRES_USER: llmkb
      POSTGRES_PASSWORD: llmkb_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmkb -d llm-kb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
